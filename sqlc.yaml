version: "2"
sql:
  - engine: "postgresql"
    queries: "queries"
    schema: "migrations/000001_init.up.sql"
    gen:
      go:
        package: "store"
        out: "internal/store"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: false
        emit_empty_slices: true
        emit_prepared_queries: false
        emit_exact_table_names: false
