version: "2"
sql:
  - engine: "postgresql"
    queries: "queries"
    schema:
      - "migrations/000001_init.up.sql"
      - "migrations/000002_project_featured.up.sql"
      - "migrations/000003_blog_post_reading_time.up.sql"
      - "migrations/000004_admin_crud_columns.up.sql"
      - "migrations/000005_blog_post_og_image.up.sql"
    gen:
      go:
        package: "store"
        out: "internal/store"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: false
        emit_empty_slices: true
        emit_prepared_queries: false
        emit_exact_table_names: false
